<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#999999;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield shape with 3D effect -->
  <g id="shield">
    <!-- Left face (gray) -->
    <polygon points="100,30 60,60 60,110 100,140 100,30" fill="#b0b0b0" opacity="0.8"/>
    
    <!-- Front face (white/light) -->
    <polygon points="100,30 140,60 140,110 100,140 100,30" fill="url(#shieldGradient)" stroke="#666" stroke-width="1"/>
    
    <!-- Inner dark area -->
    <polygon points="105,45 135,65 135,105 105,125 105,45" fill="#1a1a1a"/>
    
    <!-- Fire/energy effect inside -->
    <path d="M 115 75 Q 120 85 115 95 Q 110 85 115 75" fill="#ff6600" opacity="0.8" filter="url(#glow)"/>
    <path d="M 125 80 Q 128 90 125 100 Q 122 90 125 80" fill="#ff8800" opacity="0.7" filter="url(#glow)"/>
  </g>
  
  <!-- Sparks/particles -->
  <g id="sparks" filter="url(#glow)">
    <!-- Top sparks -->
    <line x1="100" y1="15" x2="100" y2="5" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
    <line x1="95" y1="20" x2="85" y2="10" stroke="#ff8800" stroke-width="1.5" opacity="0.7"/>
    <line x1="105" y1="20" x2="115" y2="10" stroke="#ff6600" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Left sparks -->
    <line x1="50" y1="70" x2="35" y2="60" stroke="#ffaa00" stroke-width="1.5" opacity="0.8"/>
    <line x1="55" y1="85" x2="40" y2="80" stroke="#ff8800" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Right sparks -->
    <line x1="150" y1="70" x2="165" y2="60" stroke="#ff6600" stroke-width="1.5" opacity="0.8"/>
    <line x1="145" y1="85" x2="160" y2="80" stroke="#ffaa00" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Bottom sparks -->
    <line x1="90" y1="145" x2="80" y2="160" stroke="#ff8800" stroke-width="1.5" opacity="0.7"/>
    <line x1="110" y1="145" x2="120" y2="160" stroke="#ff6600" stroke-width="1.5" opacity="0.8"/>
  </g>
  
  <!-- Glow effect dots -->
  <g id="dots" fill="#ffaa00" opacity="0.6">
    <circle cx="110" cy="55" r="1.5"/>
    <circle cx="120" cy="70" r="1"/>
    <circle cx="115" cy="90" r="1.5"/>
    <circle cx="125" cy="100" r="1"/>
    <circle cx="110" cy="110" r="1.5"/>
  </g>
</svg>
