<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="C-Forged - Custom electronics, PCB design, and hardware solutions by Cecil Morrison. Based out of Ohio.">
    <title>C-Forged | Cecil Morrison - Electronics &amp; Hardware Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading { font-family: 'Space Grotesk', sans-serif; }
        .dark-bg { background: #0a0a0a; }
    </style>
</head>
<body class="dark-bg text-zinc-100">

    <!-- NAV -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.svg" alt="C-Forged Logo" class="h-10 w-auto">
                <span class="text-2xl font-bold tracking-tighter heading">C-FORGED</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#about" class="hover:text-orange-400 transition">About</a>
                <a href="#services" class="hover:text-orange-400 transition">Services</a>
                <a href="#contact" class="hover:text-orange-400 transition">Contact</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="min-h-screen flex items-center relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <div class="inline-flex items-center gap-2 bg-zinc-900 px-5 py-2 rounded-full text-orange-400 text-sm font-medium">
                    <i class="fas fa-bolt"></i>
                    <span>Based out of Ohio</span>
                </div>
                
                <h1 class="text-6xl md:text-7xl font-bold heading tracking-tighter leading-none">
                    Cecil Morrison
                </h1>
                <p class="text-4xl text-orange-400 heading">Hardware Designer &amp; Maker</p>
                <p class="text-xl text-zinc-400 max-w-md">
                    C-Forged — Custom PCBs, electronics prototypes, 3D-printed solutions, and workshop tools.
                </p>
                
                <div class="flex gap-4">
                    <a href="#contact" class="px-8 py-4 bg-orange-600 hover:bg-orange-500 rounded-2xl font-semibold flex items-center gap-3 transition">
                        Get in Touch
                        <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>
            
            <div class="flex justify-center">
                <img src="logo.svg" alt="C-Forged Logo" class="w-80 h-80 object-contain drop-shadow-2xl">
            </div>
        </div>
    </section>

    <!-- More sections would go here but keeping it simple -->

    <footer class="bg-black py-12 border-t border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 text-center text-zinc-500">
            <p>&copy; 2026 C-Forged • Cecil Morrison • Ohio</p>
        </div>
    </footer>

</body>
</html>
